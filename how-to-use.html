<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How to Use - Nightcore Visualizer</title>
  <link rel="icon" type="image/png" href="./favicon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at center, #132847 0%, #07111f 45%, #02040a 100%);
      color: rgba(245, 250, 255, 0.95);
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.8;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(34px, 6vw, 60px);
      margin-bottom: 12px;
      text-align: center;
      text-shadow: 0 0 24px rgba(112, 223, 255, 0.5);
    }

    .subtitle {
      text-align: center;
      color: rgba(220, 240, 255, 0.72);
      margin-bottom: 48px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 24px;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 40px rgba(112,223,255,0.08);
    }

    h2 {
      font-size: 28px;
      margin-bottom: 18px;
      color: #8be6ff;
    }

    h3 {
      font-size: 20px;
      margin-top: 24px;
      margin-bottom: 10px;
      color: #bfefff;
    }

    p {
      color: rgba(240,250,255,0.9);
    }

    ul {
      padding-left: 22px;
      margin-top: 10px;
    }

    li {
      margin-bottom: 8px;
    }

    .step {
      margin-bottom: 22px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
    }

    .highlight {
      color: #70dfff;
      font-weight: 700;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      min-height: 50px;

      padding: 14px 24px;

      border-radius: 999px;

      text-decoration: none;

      font-weight: 800;

      color: #04111c;

      background:
        linear-gradient(
          135deg,
          #ffffff,
          #70dfff 45%,
          #7b8cff
        );

      box-shadow:
        0 0 28px rgba(112,223,255,0.28);

      transition:
        transform 0.15s ease,
        box-shadow 0.15s ease;
    }

    .button:hover {
      transform: translateY(-2px);

      box-shadow:
        0 0 38px rgba(112,223,255,0.42);
    }

    footer {
      margin-top: 60px;
      text-align: center;
      color: rgba(220,240,255,0.5);
      font-size: 14px;
    }

    code {
      background: rgba(255,255,255,0.08);
      padding: 2px 8px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>How to Use</h1>

    <p class="subtitle">
      Nightcore Visualizer Guide / ナイトコアビジュアライザー使い方ガイド
    </p>

    <div class="card">

      <h2>Back to Visualizer</h2>

      <a
        class="button"
        href="./index.html"
        onclick="window.close();"
      >
        Open Visualizer
      </a>

    </div>

    <footer>
      Nightcore Visualizer / Meshio-cell
    </footer>

  </div>

</body>
</html>
